name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: SSH into EC2 and deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 16.171.226.18
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}

          port: 22
          script: |
            cd /home/ubuntu
            ls